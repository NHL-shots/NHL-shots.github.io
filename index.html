<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey ScrollyTeller</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ihmeuw/scrollyteller@1.0.2/dist/lib.js"></script>
</head>
<body>
    <div class="hero-section">
        <h1>🏒 NHL Shot Analysis 2025</h1>
        <div class="hero-controls">
            <label for="hero-filter">Filter shots: </label>
            <select id="hero-filter">
                <option value="all">All Shots</option>
                <option value="goals">Goals Only</option>
                <option value="non-goals">Missed/Saved Only</option>
            </select>
        </div>
        <div id="hero-chart"></div>
    </div>

    <!-- ScrollyTeller: narration LEFT, graph RIGHT -->
    <div id="scrollyteller-app" class="scrollyteller">
        <div class="scrollyteller__narration"></div>   <!-- LEFT: scrolling text -->
        <div id="st-graph" class="scrollyteller__graph"></div>   <!-- RIGHT: sticky graph -->
    </div>

    <script src="main.js"></script>
</body>
</html>
